{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center mt-3 mt-md-5" data-aos="zoom-in">
    <div class="col-12 col-md-8 col-lg-5">
        <div class="card p-4 p-md-5">
            <div class="text-center mb-4">
                <i class="fa-solid fa-user-plus" style="font-size: 3rem; color: var(--primary);"></i>
                <h3 class="fw-bold mt-3">Create Account</h3>
                <p class="text-muted small">Join DiagnoAI and predict early</p>
            </div>
            
            <form method="POST" action="{{ url_for('register') }}">
                <div class="mb-4 input-group">
                    <span class="input-group-text"><i class="fa-solid fa-user"></i></span>
                    <div class="form-floating flex-grow-1">
                        <input type="text" class="form-control focus-ring" id="username" name="username" placeholder="Username" required>
                        <label for="username">Username</label>
                    </div>
                </div>
                
                <div class="mb-4 input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <div class="form-floating flex-grow-1">
                        <input type="password" class="form-control focus-ring" id="password" name="password" placeholder="Password" required>
                        <label for="password">Password</label>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-gradient-primary w-100 mt-2 py-3">Register Now</button>
            </form>
            
            <hr class="my-4 text-muted">
            <p class="text-center mb-0">Already registered? <a href="{{ url_for('login') }}" class="fw-bold text-primary text-decoration-none">Login Here</a></p>
        </div>
    </div>
</div>
{% endblock %}
